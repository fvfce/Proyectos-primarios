<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="decorador.css">
</head>
<body>

    <div class="calculadora">
    <input type="text">

    <button class="num">1</button>
    <button class="num">2</button>
    <button class="num">3</button>
    <button class="num">4</button>
    <button class="num">5</button>
    <button class="num">6</button>
    <button class="num">7</button>
    <button class="num">8</button>
    <button class="num">9</button>
    <button class="num">0</button>
    

    <button class="operar" id="suma">+</button>
    <button class="operar" id="resta">-</button>
    <button class="operar" id="multiplicacion">x</button>
    <button class="operar" id="divicion">/</button>


    <button class="igual" id="igualdad">=</button>
     
    </div>

    <script>
        let numero = document.querySelectorAll(".num");


        let operador = document.querySelectorAll(".operar");

        let igualdad = document.querySelector(".igual");

        let selector = document.querySelector("input");

        /*Variables de control*/
        let resultado = ""

        let preciono_boton = false;

        let listado;

        let recargar = 0;


        function numeros(valor) {

            if (resultado != "" && recargar === 1) {
                selector.value = ""
                resultado = ""
                selector.value += valor
            }else {
                selector.value += valor
            }

            if (preciono_boton) {
                preciono_boton = false
            }
            
        }

        function operadores(valor) {

            if (valor != "x" && preciono_boton != true) {
                selector.value += ` ${valor} `
                preciono_boton = true;
                recargar = 0;
            }else if (valor === "x" && preciono_boton != true) {
                selector.value += " * "
                preciono_boton = true;
                recargar = 0;
            }
            
        }        

        function temporal() {

            let exprecion = selector.value;

            listado = exprecion.split(" ");

            if (listado.includes("+") || listado.includes("-") || listado.includes("*") || listado.includes("/")) {
                selector.value = eval(exprecion);

                resultado = eval(exprecion);
                recargar = 1
            }

            
            
        }


        for (let elemento of numero) {
            elemento.addEventListener("click", () => {numeros(elemento.textContent)})
        }

        for (let oper of operador) {
            oper.addEventListener("click", () => operadores(oper.textContent))
        }


        igualdad.addEventListener("click", temporal);

    </script>
</body>
</html>
